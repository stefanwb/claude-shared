name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded PR builds, but never cancel a run on main —
  # main runs validate merged code and must complete.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            docker:
              - 'claude-docker/**'
              - '.github/workflows/ci.yml'

  validate:
    name: Validate
    runs-on: ubuntu-latest
    # No 'if' gate: repo-wide steps (frontmatter, markdown, links) must run on
    # every PR regardless of which paths changed. claude-docker-scoped steps
    # (shellcheck, unit tests, hadolint, supply-chain audit) run here too — the
    # job is cheap enough that per-step path gating isn't worth the complexity.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: ShellCheck claude-docker shell scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          severity: warning
          scandir: claude-docker
          version: v0.11.0

      - name: Unit tests — update_pins.py helpers
        # stdlib unittest on the runner's preinstalled python3 — no install,
        # no third-party action (the suite imports only the standard library).
        run: python3 -m unittest discover -s claude-docker/tests -p 'test_*.py' -v

      - name: Hadolint claude-docker/Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: claude-docker/Dockerfile
          config: claude-docker/.hadolint.yaml
          failure-threshold: warning

      - name: npm-pinned tools supply-chain audit
        # For EVERY npm-pinned tool (versions live in pins/*.env, generated by
        # update_pins.py) enforce two policies: (1) tarball signed by npm's
        # keyring over dist.integrity (`npm audit signatures`), (2) a soak window
        # since publish so loud supply-chain attacks get yanked before we ingest.
        #
        # NOTE: the primary soak gate lives in update_pins.py (default 7 days, at
        # pin-generation time), so a normally-generated pin always clears this.
        # This 5-day check is a BACKSTOP for manual `update_pins.py --pin`
        # overrides, which bypass the generator's soak. Keep this window <= the
        # generator's so generated pins never trip it.
        run: |
          set -euo pipefail
          audit() {  # $1=npm package  $2=pin file (under pins/)  $3=version var
            local pkg="$1" ver published age scratch
            ver=$(grep -oP "(?<=^$3=).+" "claude-docker/pins/$2") \
              || { echo "::error::could not read $3 from claude-docker/pins/$2"; exit 1; }
            # `npm view` errors go to stderr (empty stdout), so jq would parse "";
            # `jq -e` also makes a missing/`null` version entry exit non-zero.
            # Either way we fail loudly with the package name instead of a cryptic
            # `date: invalid date 'null'` downstream.
            published=$(npm view "${pkg}@${ver}" time --json | jq -er --arg v "$ver" '.[$v]') \
              || { echo "::error::could not resolve publish time for ${pkg}@${ver} (npm view/jq failed)"; exit 1; }
            age=$(( ( $(date -u +%s) - $(date -u -d "$published" +%s) ) / 86400 ))
            if (( age < 5 )); then
              echo "::error::${pkg}@${ver} is ${age}d old (<5d soak). Published ${published}."
              exit 1
            fi
            echo "Soak: ${pkg}@${ver} is ${age}d old (>=5d)."
            # `npm audit signatures` needs an installed tree; install into a scratch dir.
            scratch=$(mktemp -d)
            ( cd "$scratch" && npm init -y >/dev/null && npm install --ignore-scripts --no-audit --no-fund --silent "${pkg}@${ver}" && npm audit signatures )
          }
          audit "@anthropic-ai/claude-code" claude-code.env CLAUDE_CODE_VERSION
          audit "@fission-ai/openspec"      openspec.env    OPENSPEC_VERSION
          audit "pnpm"                      pnpm.env        PNPM_VERSION

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Validate agent and skill frontmatter
        run: uv run --with 'pyyaml==6.0.2' python3 .github/scripts/check-frontmatter.py

      - name: Markdown lint (advisory)
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9  # v23.0.0
        continue-on-error: true
        with:
          globs: '**/*.md'

      - name: Broken relative links (advisory, offline)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        continue-on-error: true
        with:
          args: --offline --include-fragments --no-progress .

  docker-build:
    name: Docker build (validate, no push)
    needs: [changes, validate]
    if: github.event_name == 'push' || needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - name: Build (amd64, no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: claude-docker
          # Load into the local daemon so the smoke test below can run the
          # image. Build is amd64-only (single-arch load is fine); arm64
          # coverage relies on the maintainers' local builds for now.
          load: true
          tags: claude-docker:ci
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Smoke test — claude --version matches Dockerfile pin
        # Catches the 2.1.x failure mode where the JS launcher is installed
        # but the native-binary postinstall isn't run, leaving `claude` as a
        # stub that errors at exec time. Asserts the actual reported version
        # matches the CLAUDE_CODE_VERSION pin in pins/claude-code.env.
        run: |
          set -euo pipefail
          EXPECTED=$(grep -oP '(?<=^CLAUDE_CODE_VERSION=).+' claude-docker/pins/claude-code.env)
          ACTUAL=$(docker run --rm claude-docker:ci claude --version)
          echo "Expected: ${EXPECTED}  Actual: ${ACTUAL}"
          [[ "$ACTUAL" == "${EXPECTED} (Claude Code)" ]]
