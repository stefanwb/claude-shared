name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded PR builds, but never cancel a run on main —
  # main runs validate merged code and must complete.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            docker:
              - 'claude-docker/**'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: ShellCheck claude-docker/run.sh
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          severity: warning
          scandir: claude-docker

      - name: Hadolint claude-docker/Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: claude-docker/Dockerfile
          config: claude-docker/.hadolint.yaml
          failure-threshold: warning

      - name: claude-code npm supply-chain audit
        # Two policies enforced together against the version pinned in the
        # Dockerfile: (1) tarball signed by npm's keyring over dist.integrity
        # (`npm audit signatures`), (2) ≥5-day soak window since publish to
        # let loud supply-chain attacks get yanked before we ingest them.
        run: |
          set -euo pipefail
          VER=$(grep -oP '(?<=^ARG CLAUDE_CODE_VERSION=).+' claude-docker/Dockerfile)
          PUBLISHED=$(npm view "@anthropic-ai/claude-code@${VER}" time --json | jq -r --arg v "$VER" '.[$v]')
          AGE_DAYS=$(( ( $(date -u +%s) - $(date -u -d "$PUBLISHED" +%s) ) / 86400 ))
          if (( AGE_DAYS < 5 )); then
            echo "::error::@anthropic-ai/claude-code@${VER} is ${AGE_DAYS}d old (<5d soak). Published ${PUBLISHED}."
            exit 1
          fi
          echo "Soak: @anthropic-ai/claude-code@${VER} is ${AGE_DAYS}d old (>=5d)."
          # `npm audit signatures` needs an installed tree; install into a scratch dir.
          SCRATCH=$(mktemp -d)
          ( cd "$SCRATCH" && npm init -y >/dev/null && npm install --ignore-scripts --no-audit --no-fund --silent "@anthropic-ai/claude-code@${VER}" && npm audit signatures )

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Validate agent and skill frontmatter
        run: uv run --with 'pyyaml==6.0.2' python3 .github/scripts/check-frontmatter.py

      - name: Markdown lint (advisory)
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9  # v23.0.0
        continue-on-error: true
        with:
          globs: '**/*.md'

      - name: Broken relative links (advisory, offline)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        continue-on-error: true
        with:
          args: --offline --include-fragments --no-progress .

  docker-build:
    name: Docker build (validate, no push)
    needs: [changes, lint]
    if: github.event_name == 'push' || needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - name: Build (amd64, no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: claude-docker
          # Load into the local daemon so the smoke test below can run the
          # image. Build is amd64-only (single-arch load is fine); arm64
          # coverage relies on the maintainers' local builds for now.
          load: true
          tags: claude-docker:ci
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Smoke test — claude --version matches Dockerfile pin
        # Catches the 2.1.x failure mode where the JS launcher is installed
        # but the native-binary postinstall isn't run, leaving `claude` as a
        # stub that errors at exec time. Asserts the actual reported version
        # matches the CLAUDE_CODE_VERSION ARG in the Dockerfile.
        run: |
          set -euo pipefail
          EXPECTED=$(grep -oP '(?<=^ARG CLAUDE_CODE_VERSION=).+' claude-docker/Dockerfile)
          ACTUAL=$(docker run --rm claude-docker:ci claude --version)
          echo "Expected: ${EXPECTED}  Actual: ${ACTUAL}"
          [[ "$ACTUAL" == "${EXPECTED} (Claude Code)" ]]
