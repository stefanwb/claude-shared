name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded PR builds, but never cancel a run on main —
  # main runs validate merged code and must complete.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        with:
          filters: |
            docker:
              - 'claude-docker/**'
              - '.github/workflows/ci.yml'

  validate:
    name: Validate
    runs-on: ubuntu-latest
    # No 'if' gate: repo-wide steps (frontmatter, markdown, links) must run on
    # every PR; the claude-docker-scoped steps are cheap enough to run alongside.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: ShellCheck claude-docker shell scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # 2.0.0
        with:
          severity: warning
          scandir: claude-docker
          version: v0.11.0

      - name: Unit tests — update_pins.py helpers
        # stdlib unittest on the runner's preinstalled python3 — no install,
        # no third-party action (the suite imports only the standard library).
        run: python3 -m unittest discover -s claude-docker/tests -p 'test_*.py' -v

      - name: Hadolint claude-docker/Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: claude-docker/Dockerfile
          config: claude-docker/.hadolint.yaml
          failure-threshold: warning

      - name: npm-pinned tools supply-chain audit
        # For EVERY npm-pinned tool enforce two policies: (1) tarball signed by
        # npm's keyring over dist.integrity (`npm audit signatures`), (2) soak
        # since publish (default 7 days) so loud supply-chain attacks get yanked
        # before we ingest.  The soak gate is enforced by update_pins.py --audit,
        # which is the single source of truth for soak logic (including the window
        # default — see GitHub issues #50 and #51).  The tool list is provided by
        # update_pins.py --list-npm-tools so CI never re-implements generator logic.
        run: |
          set -euo pipefail
          python3 claude-docker/update_pins.py --audit
          # Capture the tool list into a variable BEFORE looping: a process
          # substitution `done < <(cmd)` does NOT propagate cmd's non-zero exit
          # under `set -e`, so a fail-closed --list-npm-tools (e.g. a missing pin)
          # would silently yield an empty loop and skip every signature check
          # (fail-open). `$(...)` assignment, by contrast, DOES abort the step
          # under `set -e`, so the here-string consumer below is fail-closed.
          tools=$(python3 claude-docker/update_pins.py --list-npm-tools)
          while IFS=$'\t' read -r name pkg env var ver; do
            [ -n "$ver" ] || { echo "::error::no pinned version for $name"; exit 1; }
            scratch=$(mktemp -d)
            ( cd "$scratch" && npm init -y >/dev/null \
              && npm install --ignore-scripts --no-audit --no-fund --silent "${pkg}@${ver}" \
              && npm audit signatures )
          done <<< "$tools"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Validate agent and skill frontmatter
        run: uv run --with 'pyyaml==6.0.2' python3 .github/scripts/check-frontmatter.py

      - name: Markdown lint (advisory)
        uses: DavidAnson/markdownlint-cli2-action@ce4853d43830c74c1753b39f3cf40f71c2031eb9  # v23.0.0
        continue-on-error: true
        with:
          globs: '**/*.md'

      - name: Broken relative links (advisory, offline)
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        continue-on-error: true
        with:
          args: --offline --include-fragments --no-progress .

  docker-build:
    name: Docker build (validate, no push)
    needs: [changes, validate]
    if: github.event_name == 'push' || needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0
      - name: Build (amd64, no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: claude-docker
          # Load into the local daemon so the smoke test below can run the
          # image. Build is amd64-only (single-arch load is fine); arm64
          # coverage relies on the maintainers' local builds for now.
          load: true
          tags: claude-docker:ci
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Smoke test — claude --version matches Dockerfile pin
        # Catches the 2.1.x failure mode where the JS launcher is installed
        # but the native-binary postinstall isn't run, leaving `claude` as a
        # stub that errors at exec time. Asserts the actual reported version
        # matches the CLAUDE_CODE_VERSION pin in pins/claude-code.env.
        run: |
          set -euo pipefail
          EXPECTED=$(python3 claude-docker/update_pins.py --list-npm-tools | awk -F'\t' '$1=="claude-code"{print $5}')
          ACTUAL=$(docker run --rm claude-docker:ci claude --version)
          echo "Expected: ${EXPECTED}  Actual: ${ACTUAL}"
          [[ "$ACTUAL" == "${EXPECTED} (Claude Code)" ]]
